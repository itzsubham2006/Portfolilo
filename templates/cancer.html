<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cancer_detect.py</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/shub_logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    <div class="matrix-rain" id="matrix"></div>

    <nav class="navbar">
        <div class="nav-logo">
            <span class="prompt">┌─[</span><span class="user">subham</span><span class="at">@</span><span class="host">portfolio</span><span class="prompt">]</span><span class="sep">─</span><span class="dir">~/ml-suite</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">home</a></li>
            <li><a href="/system">predictions</a></li>
        </ul>
        <div class="menu-toggle"><span></span><span></span><span></span></div>
    </nav>

    <section class="prediction-page">
        <a href="/system" class="back-link">back</a>

        <div class="terminal-prompt-line" style="margin-bottom: 1.5rem;">
            <span class="prompt-user">subham</span><span class="at">@</span><span class="prompt-dir">ml-suite</span>
            <span class="prompt-sym">$</span>
            <span>python cancer_detect.py --mode interactive</span>
            <span class="cursor"></span>
        </div>

        <div class="prediction-form">
            <div class="form-terminal-bar">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <span class="filename">cancer_detect.py</span>
            </div>

            <div class="form-body">
                <div class="form-section">
                    <div class="form-section-label">mean_values</div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="radius_mean">radius_mean</label>
                            <input type="number" name="radius_mean" required placeholder="14.0">
                        </div>
                        <div class="input-group">
                            <label for="area_mean">area_mean</label>
                            <input type="number" name="area_mean" required placeholder="500">
                        </div>
                        <div class="input-group">
                            <label for="concavity_mean">concavity_mean</label>
                            <input type="number" name="concavity_mean" required placeholder="0.1">
                        </div>
                        <div class="input-group">
                            <label for="concave_points_mean">concave_points_mean</label>
                            <input type="number" name="concave_points_mean" required placeholder="0.05">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-label">standard_error</div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="texture_se">texture_se</label>
                            <input type="number" name="texture_se" required placeholder="1.0">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-label">worst_values</div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="radius_worst">radius_worst</label>
                            <input type="number" name="radius_worst" required placeholder="15.0">
                        </div>
                        <div class="input-group">
                            <label for="texture_worst">texture_worst</label>
                            <input type="number" name="texture_worst" required placeholder="20.0">
                        </div>
                        <div class="input-group">
                            <label for="perimeter_worst">perimeter_worst</label>
                            <input type="number" name="perimeter_worst" required placeholder="100">
                        </div>
                        <div class="input-group">
                            <label for="area_worst">area_worst</label>
                            <input type="number" name="area_worst" required placeholder="600">
                        </div>
                        <div class="input-group">
                            <label for="compactness_worst">compactness_worst</label>
                            <input type="number" name="compactness_worst" required placeholder="0.2">
                        </div>
                        <div class="input-group">
                            <label for="concavity_worst">concavity_worst</label>
                            <input type="number" name="concavity_worst" required placeholder="0.3">
                        </div>
                        <div class="input-group">
                            <label for="concave_points_worst">concave_points_worst</label>
                            <input type="number" name="concave_points_worst" required placeholder="0.1">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary predict-btn">
                    <span>./predict --model cancer_detection_rf</span>
                    <i class="fa-solid fa-dna"></i>
                </button>
            </div>
        </div>
    </section>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
