<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>result</title>
    <link rel="icon" type="image/png" href="/static/images/shub_logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    <div class="matrix-rain" id="matrix"></div>

    <nav class="navbar">
        <div class="nav-logo">
            <span class="prompt">┌─[</span><span class="user">subham</span><span class="at">@</span><span class="host">portfolio</span><span class="prompt">]</span><span class="sep">─</span><span class="dir">~/ml-suite</span>
        </div>
    </nav>

    <section class="result-page">
        <div class="result-box">
            <div class="terminal-prompt-line" style="justify-content: center; margin-bottom: 1rem;">
                <span class="prompt-user">subham</span><span class="at">@</span><span class="prompt-dir">ml-suite</span>
                <span class="prompt-sym">$</span>
                <span>./predict --model {{ model_name.lower().replace(' ', '_') }}</span>
            </div>

            <div class="terminal-output" style="margin-bottom: 1.5rem;">
                <div class="output-line">
                    <span class="num">></span>
                    <span class="content"><span class="key">model</span> : <span class="val">{{ model_name }}</span></span>
                </div>
                <div class="output-line">
                    <span class="num">></span>
                    <span class="content"><span class="key">status</span> : <span class="highlight">COMPLETE</span></span>
                </div>
                <div class="output-line">
                    <span class="num">></span>
                    <span class="content"><span class="key">result</span> : </span>
                </div>
            </div>

            <div class="result-text {{ 'safe' if 'Healthy' in prediction_text or 'Benign' in prediction_text else 'risk' }}">
                {{ prediction_text }}
            </div>

            <a href="/system" class="btn btn-outline">
                <span>&lt; cd ../</span>
            </a>
        </div>
    </section>
</body>
</html>
