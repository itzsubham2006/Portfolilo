<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction | ML System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .prediction-page { padding: 120px 5% 60px; min-height: 100vh; }
        .prediction-header { text-align: center; margin-bottom: 3rem; }
        .prediction-header h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 1rem; }
        .prediction-header p { color: var(--text-secondary); max-width: 600px; margin: 0 auto; }
        .prediction-form {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-tertiary);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; }
        .input-group input,
        .input-group select {
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-mono);
            transition: all 0.3s ease;
        }
        .input-group input:focus,
        .input-group select:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }
        .input-group small { font-size: 0.75rem; color: var(--text-muted); }
        .predict-btn {
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .result-display {
            display: none;
            text-align: center;
            padding: 3rem;
            margin-top: 2rem;
            border-radius: 20px;
            animation: fadeIn 0.5s ease;
        }
        .result-display.show { display: block; }
        .result-display.safe { background: rgba(0, 255, 136, 0.1); border: 2px solid #00ff88; }
        .result-display.danger { background: rgba(255, 68, 68, 0.1); border: 2px solid #ff4444; }
        .result-icon { font-size: 4rem; margin-bottom: 1rem; }
        .result-display.safe .result-icon { color: #00ff88; }
        .result-display.danger .result-icon { color: #ff4444; }
        .result-display h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .result-display p { color: var(--text-secondary); }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .back-link:hover { gap: 0.75rem; }
        .loading { display: none; text-align: center; padding: 2rem; }
        .loading.show { display: block; }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid var(--bg-secondary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    
    <nav class="navbar">
        <div class="nav-logo"><a href="../index.html">SHUB<span class="accent">.AI</span></a></div>
        <ul class="nav-links">
            <li><a href="../index.html#home">Home</a></li>
            <li><a href="../index.html#about">About</a></li>
            <li><a href="../index.html#skills">Skills</a></li>
            <li><a href="../index.html#projects">Projects</a></li>
            <li><a href="../index.html#contact">Contact</a></li>
        </ul>
        <div class="menu-toggle"><span></span><span></span><span></span></div>
    </nav>

    <section class="prediction-page">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;">
            <a href="../index.html#projects" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <a href="cancer.html" class="back-link"><i class="fa-solid fa-dna"></i> Cancer</a>
        </div>
        
        <div class="prediction-header">
            <h1>Heart Disease Prediction</h1>
            <p>Enter the patient's medical details below to predict the likelihood of heart disease using our trained ML model.</p>
        </div>

        <form class="prediction-form" id="heartForm">
            <div class="input-grid">
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" required min="1" max="120">
                </div>
                <div class="input-group">
                    <label for="sex">Sex</label>
                    <select id="sex" required>
                        <option value="">Select...</option>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="cp">Chest Pain Type (0-3)</label>
                    <input type="number" id="cp" required min="0" max="3">
                    <small>0: Typical, 1: Atypical, 2: Non-anginal, 3: Asymptomatic</small>
                </div>
                <div class="input-group">
                    <label for="trestbps">Resting Blood Pressure (mm Hg)</label>
                    <input type="number" id="trestbps" required min="50" max="250">
                </div>
                <div class="input-group">
                    <label for="chol">Serum Cholesterol (mg/dl)</label>
                    <input type="number" id="chol" required min="100" max="600">
                </div>
                <div class="input-group">
                    <label for="fbs">Fasting Blood Sugar &gt; 120 mg/dl</label>
                    <select id="fbs" required>
                        <option value="">Select...</option>
                        <option value="1">True</option>
                        <option value="0">False</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="restecg">Resting ECG Results</label>
                    <select id="restecg" required>
                        <option value="">Select...</option>
                        <option value="0">Normal</option>
                        <option value="1">ST-T Abnormality</option>
                        <option value="2">Left Ventricular Hypertrophy</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="thalach">Maximum Heart Rate</label>
                    <input type="number" id="thalach" required min="60" max="220">
                </div>
                <div class="input-group">
                    <label for="exang">Exercise Induced Angina</label>
                    <select id="exang" required>
                        <option value="">Select...</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="oldpeak">ST Depression</label>
                    <input type="number" id="oldpeak" required step="0.1" min="0" max="10">
                </div>
                <div class="input-group">
                    <label for="slope">ST Slope</label>
                    <select id="slope" required>
                        <option value="">Select...</option>
                        <option value="0">Upsloping</option>
                        <option value="1">Flat</option>
                        <option value="2">Downsloping</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="ca">Major Vessels (0-3)</label>
                    <input type="number" id="ca" required min="0" max="3">
                </div>
                <div class="input-group">
                    <label for="thal">Thalassemia</label>
                    <select id="thal" required>
                        <option value="">Select...</option>
                        <option value="0">Normal</option>
                        <option value="1">Fixed Defect</option>
                        <option value="2">Reversible Defect</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary predict-btn">
                <span>Predict</span>
                <i class="fa-solid fa-brain"></i>
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Analyzing data...</p>
        </div>

        <div class="result-display" id="result">
            <div class="result-icon"><i class="fa-solid fa-heart-pulse"></i></div>
            <h2 id="resultTitle"></h2>
            <p id="resultText"></p>
        </div>
    </section>

    <script src="../js/script.js"></script>
    <script>
        const heartForm = document.getElementById('heartForm');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultText = document.getElementById('resultText');

        function getFormData() {
            return [
                parseFloat(document.getElementById('age').value),
                parseFloat(document.getElementById('sex').value),
                parseFloat(document.getElementById('cp').value),
                parseFloat(document.getElementById('trestbps').value),
                parseFloat(document.getElementById('chol').value),
                parseFloat(document.getElementById('fbs').value),
                parseFloat(document.getElementById('restecg').value),
                parseFloat(document.getElementById('thalach').value),
                parseFloat(document.getElementById('exang').value),
                parseFloat(document.getElementById('oldpeak').value),
                parseFloat(document.getElementById('slope').value),
                parseFloat(document.getElementById('ca').value),
                parseFloat(document.getElementById('thal').value)
            ];
        }

        function simulatePrediction(data) {
            let riskScore = 0;
            if (data[0] > 55) riskScore += 2;
            if (data[2] > 1) riskScore += 2;
            if (data[3] > 140) riskScore += 1;
            if (data[4] > 200) riskScore += 1;
            if (data[5] === 1) riskScore += 2;
            if (data[7] < 140) riskScore += 2;
            if (data[8] === 1) riskScore += 2;
            if (data[9] > 1) riskScore += 2;
            return riskScore > 5;
        }

        if (heartForm) {
            heartForm.addEventListener('submit', (e) => {
                e.preventDefault();
                heartForm.style.display = 'none';
                loading.classList.add('show');
                
                const data = getFormData();
                
                setTimeout(() => {
                    loading.classList.remove('show');
                    const isDanger = simulatePrediction(data);
                    
                    if (isDanger) {
                        result.className = 'result-display danger';
                        resultTitle.textContent = 'Warning: Heart Disease Risk Detected';
                        resultText.textContent = 'Based on the provided data, there is a high likelihood of heart disease. Please consult a healthcare professional.';
                    } else {
                        result.className = 'result-display safe';
                        resultTitle.textContent = 'Low Risk Detected';
                        resultText.textContent = 'The results indicate a low probability of heart disease. Maintain a healthy lifestyle!';
                    }
                    result.classList.add('show');
                }, 2000);
            });
        }
    </script>
</body>
</html>
